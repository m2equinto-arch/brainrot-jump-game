<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainrot Jump</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body {
            background: #0a1a0a;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Comic Sans MS', 'Segoe UI', sans-serif;
            user-select: none;
        }
        #gameContainer { position: relative; width: 100vw; height: 100vh; cursor: pointer; }
        canvas { display: block; width: 100%; height: 100%; }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="game"></canvas>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let W, H, BORDER_W, PLAY_LEFT, PLAY_RIGHT, PLAY_W;

// --- CHARGEMENT DES IMAGES ---
const imgPatapin = new Image(); imgPatapin.src = "patapim.png";
const imgSahur = new Image(); imgSahur.src = "sahur.png";
const imgCappuccino = new Image(); imgCappuccino.src = "cappuccino.png";
const imgBombardino = new Image(); imgBombardino.src = "bombardino.png";

function resizeCanvas() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W;
    canvas.height = H;
    BORDER_W = Math.max(80, Math.floor(W * 0.35));
    PLAY_LEFT = BORDER_W;
    PLAY_RIGHT = W - BORDER_W;
    PLAY_W = PLAY_RIGHT - PLAY_LEFT;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

let gameState = 'menu';
let player, platforms, score, cameraY;
let keys = { left: false, right: false };
let particles = [], floatingTexts = [], gameCoins = [];
let difficulty = 1, gameTime = 0, menuBob = 0;

let highScore = parseInt(localStorage.getItem('brj_highscore') || '0');
let coins = parseInt(localStorage.getItem('brj_coins') || '0');
let unlockedChars = JSON.parse(localStorage.getItem('brj_unlocked') || '["patapin"]');
let selectedChar = localStorage.getItem('brj_selected') || 'patapin';
let coinsThisRun = 0;

function saveData() {
    localStorage.setItem('brj_highscore', highScore);
    localStorage.setItem('brj_coins', coins);
    localStorage.setItem('brj_unlocked', JSON.stringify(unlockedChars));
    localStorage.setItem('brj_selected', selectedChar);
}

const CHARACTERS = [
    { id: 'patapin', name: 'Br Br Patapin', price: 0, img: imgPatapin },
    { id: 'tungtung', name: 'Tung Tung Sahur', price: 150, img: imgSahur },
    { id: 'cappuccino', name: 'Cappuccino Assassino', price: 200, img: imgCappuccino },
    { id: 'bombardino', name: 'Bombardino Crocodillo', price: 300, img: imgBombardino }
];

const PLAT_NORMAL = 0, PLAT_MOVING = 1, PLAT_BREAKING = 2, PLAT_BOOST = 3, PLAT_CRACKED = 4;
let brainrotTexts = ['skibidi!', 'sigma!', 'aura +100', 'rizz!', 'mewing!'];

function createPlayer() {
    return { x: PLAY_LEFT + PLAY_W / 2 - 28, y: H - 150, w: 56, h: 64, vy: 0, vx: 0, jumpForce: -11, gravity: 0.32, speed: 5, facing: 1, trail: [] };
}

function createPlatform(x, y, type) {
    return { x, y, w: 85, h: 22, type: type || PLAT_NORMAL, moveDir: Math.random() > 0.5 ? 1 : -1, moveSpeed: 1.5, breaking: false, breakTimer: 0, opacity: 1, bounced: false };
}

function getRandomType(h) {
    let r = Math.random(), d = Math.min(difficulty, 5);
    if (h < 4) return PLAT_NORMAL;
    if (r < 0.03 * d) return PLAT_BREAKING;
    if (r < 0.03 * d + 0.05) return PLAT_CRACKED;
    if (r < 0.03 * d + 0.09) return PLAT_BOOST;
    if (r < 0.03 * d + 0.18) return PLAT_MOVING;
    return PLAT_NORMAL;
}

function addParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push({ x, y, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6, life: 1, decay: 0.03, size: 3+Math.random()*4, color });
    }
}

function addFloatingText(x, y) {
    floatingTexts.push({ x, y, text: brainrotTexts[Math.floor(Math.random()*brainrotTexts.length)], life: 1, vy: -2 });
}

function startGame() {
    gameState = 'playing';
    player = createPlayer();
    platforms = [];
    platforms.push(createPlatform(PLAY_LEFT + PLAY_W / 2 - 42, H - 50, PLAT_NORMAL));
    for (let i = 0; i < 15; i++) platforms.push(createPlatform(PLAY_LEFT + Math.random() * (PLAY_W - 85), H - 100 - i * 50, getRandomType(i)));
    score = 0; cameraY = 0; particles = []; floatingTexts = []; gameCoins = []; coinsThisRun = 0;
    player.vy = player.jumpForce;
}

function endGame() {
    gameState = 'gameover';
    if (score > highScore) highScore = score;
    coins += coinsThisRun;
    saveData();
}

// --- DRAWING HELPERS ---
function roundRect(x, y, w, h, r) {
    ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function drawBtn(x, y, w, h, text, fontSize, isHover) {
    ctx.fillStyle = isHover ? '#888' : '#aaa';
    roundRect(x, y + 4, w, h, 14); ctx.fill();
    ctx.fillStyle = isHover ? '#e8e8e8' : '#fff';
    roundRect(x, y, w, h, 14); ctx.fill();
    ctx.fillStyle = '#555'; ctx.font = `bold ${fontSize}px sans-serif`; ctx.textAlign = 'center'; ctx.fillText(text, x + w/2, y + h/2 + 7);
}

function drawCharAt(cx, cy, scale, charId, anim) {
    let ch = CHARACTERS.find(c => c.id === charId) || CHARACTERS[0];
    if (ch.img) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.scale(scale, Math.abs(scale));
        let bob = Math.sin((anim || menuBob * 3) * 0.8) * 5;
        ctx.drawImage(ch.img, -60, -60 + bob, 120, 120);
        ctx.restore();
    }
}

function drawPlatform(p) {
    let py = p.y - cameraY;
    ctx.globalAlpha = p.opacity;
    ctx.fillStyle = p.type === PLAT_BREAKING ? '#c06060' : (p.type === PLAT_BOOST ? '#e0c030' : '#5aaa30');
    roundRect(p.x, py, p.w, p.h, 5); ctx.fill();
    ctx.globalAlpha = 1;
}

function drawHUD() {
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    roundRect(12, 12, 160, 40, 10); ctx.fill();
    ctx.fillStyle = '#333'; ctx.font = 'bold 20px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(`Score: ${score}`, 25, 38);
}

// --- LOOPS ---
function update() {
    if (gameState !== 'playing') return;
    gameTime++;
    if (keys.left) { player.vx = -player.speed; player.facing = -1; }
    else if (keys.right) { player.vx = player.speed; player.facing = 1; }
    else { player.vx *= 0.85; }
    player.x += player.vx;
    player.vy += player.gravity;
    player.y += player.vy;

    if (player.x > PLAY_RIGHT) player.x = PLAY_LEFT - player.w;
    if (player.x + player.w < PLAY_LEFT) player.x = PLAY_RIGHT;

    let targetCam = player.y - H * 0.4;
    if (targetCam < cameraY) cameraY += (targetCam - cameraY) * 0.1;
    let newScore = Math.floor(-cameraY / 10);
    if (newScore > score) { score = newScore; difficulty = 1 + Math.floor(score / 500); }

    if (player.vy > 0) {
        platforms.forEach(p => {
            if (player.x+player.w > p.x && player.x < p.x+p.w && player.y+player.h > p.y && player.y+player.h < p.y+p.h+player.vy+2) {
                if (p.type === PLAT_BREAKING) p.breaking = true;
                player.vy = p.type === PLAT_BOOST ? player.jumpForce * 1.8 : player.jumpForce;
            }
        });
    }

    let hp = Math.min(...platforms.map(p => p.y));
    while (hp > cameraY - 100) {
        let gap = 40 + Math.random() * 30 + Math.min(difficulty * 5, 40);
        let ny = hp - gap;
        platforms.push(createPlatform(PLAY_LEFT + Math.random() * (PLAY_W - 85), ny, getRandomType(100)));
        hp = ny;
    }
    platforms.forEach(p => { if (p.breaking) { p.breakTimer++; p.opacity -= 0.05; p.y += 2; }});
    platforms = platforms.filter(p => p.y - cameraY < H + 50 && p.opacity > 0);
    
    particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.02; });
    particles = particles.filter(p => p.life > 0);

    if (player.y - cameraY > H + 50) endGame();
}

function draw() {
    ctx.clearRect(0,0,W,H);
    // Background
    ctx.fillStyle = '#7ac0f0'; ctx.fillRect(0,0,W,H);

    if (gameState === 'menu') {
        ctx.fillStyle = '#fff'; ctx.font = 'bold 50px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText("BRAINROT JUMP", W/2, 100);
        drawCharAt(W/2, 300, 1.8, selectedChar);
        drawBtn(W/2-100, 450, 200, 60, "JOUER", 25, true);
    } else if (gameState === 'playing') {
        platforms.forEach(p => drawPlatform(p));
        // Highscore line
        if (highScore > 0) {
            let hsY = (-highScore * 10) - cameraY;
            if (hsY > 0 && hsY < H) {
                ctx.strokeStyle = 'white'; ctx.setLineDash([5, 5]);
                ctx.beginPath(); ctx.moveTo(PLAY_LEFT, hsY); ctx.lineTo(PLAY_RIGHT, hsY); ctx.stroke();
                ctx.setLineDash([]); ctx.fillText("RECORD", PLAY_RIGHT - 50, hsY - 5);
            }
        }
        drawCharAt(player.x + player.w/2, player.y - cameraY + player.h/2, player.facing, selectedChar, gameTime*0.1);
        
        // Murs
        ctx.fillStyle = '#1a3a15';
        ctx.fillRect(0,0,BORDER_W,H); ctx.fillRect(PLAY_RIGHT,0,BORDER_W,H);
        drawHUD();
    } else if (gameState === 'gameover') {
        ctx.fillStyle = 'red'; ctx.font = 'bold 40px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText("GAME OVER", W/2, 200);
        ctx.fillStyle = 'white'; ctx.fillText(`Score: ${score}`, W/2, 300);
        drawBtn(W/2-100, 450, 200, 60, "RETOUR", 25, true);
    }
}

function gameLoop() {
    menuBob += 0.02;
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// --- INPUTS ---
canvas.addEventListener('click', (e) => {
    if (gameState === 'menu' || gameState === 'gameover') startGame();
});
window.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') keys.left = true;
    if (e.key === 'ArrowRight') keys.right = true;
});
window.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft') keys.left = false;
    if (e.key === 'ArrowRight') keys.right = false;
});

gameLoop();
</script>
</body>
</html>
