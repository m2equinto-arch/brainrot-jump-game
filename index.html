<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Films Cultes — Dashboard</title>
<style>
  :root {
    --bg: #fafaf7;
    --surface: #ffffff;
    --surface-2: #f1efe8;
    --text: #2c2c2a;
    --text-muted: #5f5e5a;
    --text-soft: #888780;
    --border: rgba(0,0,0,0.12);
    --border-strong: rgba(0,0,0,0.22);
    --accent: #378ADD;
    --danger: #A32D2D;
    --star: #BA7517;
    --radius: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #242422;
      --surface-2: #2e2e2c;
      --text: #f1efe8;
      --text-muted: #b4b2a9;
      --text-soft: #888780;
      --border: rgba(255,255,255,0.14);
      --border-strong: rgba(255,255,255,0.25);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
  h1 { font-size: 26px; font-weight: 500; margin: 0 0 0.25rem; }
  .subtitle { color: var(--text-muted); font-size: 14px; margin: 0 0 1.75rem; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
  .stat-card { background: var(--surface-2); border-radius: var(--radius); padding: 1rem; }
  .stat-label { font-size: 13px; color: var(--text-muted); margin-bottom: 4px; }
  .stat-value { font-size: 24px; font-weight: 500; }
  .panel { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1.5rem; }
  .panel-title { font-size: 14px; font-weight: 500; margin-bottom: 12px; }
  .form-grid { display: grid; grid-template-columns: 2fr 1.5fr 90px 1fr auto; gap: 8px; align-items: center; }
  input, select, button, textarea { font-family: inherit; font-size: 14px; color: var(--text); background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 8px 12px; height: 36px; transition: border-color 0.15s, box-shadow 0.15s; }
  input:hover, select:hover { border-color: var(--border-strong); }
  input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(55,138,221,0.18); }
  button { cursor: pointer; background: var(--surface); white-space: nowrap; }
  button:hover { background: var(--surface-2); }
  button:active { transform: scale(0.98); }
  .controls { display: flex; gap: 8px; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
  .tabs { display: flex; gap: 4px; background: var(--surface-2); border-radius: var(--radius); padding: 3px; }
  .tab-btn { border: none; background: transparent; padding: 6px 14px; font-size: 13px; border-radius: 6px; color: var(--text-muted); height: auto; }
  .tab-btn:hover { background: transparent; color: var(--text); }
  .tab-btn.active { background: var(--surface); color: var(--text); font-weight: 500; }
  #search { flex: 1; min-width: 160px; }
  .film-row { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center; padding: 12px 14px; border: 0.5px solid var(--border); border-radius: var(--radius); background: var(--surface); margin-bottom: 8px; }
  .film-title { font-weight: 500; font-size: 15px; }
  .film-meta { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
  .genre-pill { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-left: 6px; vertical-align: middle; }
  .film-actions { display: flex; gap: 6px; align-items: center; }
  .btn-danger { color: var(--danger); }
  .rating { display: flex; gap: 2px; margin-right: 4px; }
  .star { cursor: pointer; font-size: 16px; color: var(--border-strong); user-select: none; transition: color 0.1s; }
  .star.on { color: var(--star); }
  .star:hover { color: var(--star); }
  .empty { text-align: center; padding: 2.5rem 1rem; color: var(--text-muted); font-size: 14px; }
  .footer-actions { margin-top: 1.5rem; display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
  @media (max-width: 720px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .form-grid { grid-template-columns: 1fr 1fr; }
    .form-grid > button { grid-column: 1 / -1; }
    h1 { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>🎬 Films cultes</h1>
  <p class="subtitle">Ta liste à voir et ton inventaire personnel</p>
  <div class="stats">
    <div class="stat-card"><div class="stat-label">À voir</div><div class="stat-value" id="stat-todo">0</div></div>
    <div class="stat-card"><div class="stat-label">Vus</div><div class="stat-value" id="stat-seen">0</div></div>
    <div class="stat-card"><div class="stat-label">Progression</div><div class="stat-value" id="stat-pct">0%</div></div>
    <div class="stat-card"><div class="stat-label">Note moyenne</div><div class="stat-value" id="stat-avg">–</div></div>
  </div>
  <div class="panel">
    <div class="panel-title">Ajouter un film</div>
    <div class="form-grid">
      <input type="text" id="in-title" placeholder="Titre" />
      <input type="text" id="in-director" placeholder="Réalisateur" />
      <input type="number" id="in-year" placeholder="Année" min="1900" max="2030" />
      <select id="in-genre">
        <option value="Drame">Drame</option><option value="Thriller">Thriller</option>
        <option value="Sci-Fi">Sci-Fi</option><option value="Comédie">Comédie</option>
        <option value="Action">Action</option><option value="Animation">Animation</option>
        <option value="Romance">Romance</option><option value="Aventure">Aventure</option>
        <option value="Crime">Crime</option><option value="Guerre">Guerre</option>
        <option value="Western">Western</option><option value="Musical">Musical</option>
      </select>
      <button id="btn-add">Ajouter</button>
    </div>
  </div>
  <div class="controls">
    <div class="tabs">
      <button class="tab-btn active" data-tab="todo">À voir</button>
      <button class="tab-btn" data-tab="seen">Vus</button>
    </div>
    <input type="text" id="search" placeholder="Rechercher un titre ou réalisateur..." />
    <select id="filter-genre" style="width: auto;"><option value="">Tous genres</option></select>
  </div>
  <div id="list"></div>
  <div class="footer-actions">
    <button id="btn-export">Exporter (JSON)</button>
    <button id="btn-import">Importer</button>
    <input type="file" id="file-import" accept="application/json" style="display:none" />
    <button id="btn-reset" class="btn-danger">Réinitialiser</button>
  </div>
</div>
<script>
const GENRE_COLORS = {
  "Drame":["#EEEDFE","#3C3489"],"Thriller":["#F1EFE8","#444441"],"Sci-Fi":["#E6F1FB","#0C447C"],
  "Comédie":["#FAEEDA","#854F0B"],"Action":["#FAECE7","#712B13"],"Animation":["#E1F5EE","#085041"],
  "Romance":["#FBEAF0","#72243E"],"Aventure":["#EAF3DE","#27500A"],"Crime":["#F1EFE8","#2C2C2A"],
  "Guerre":["#F1EFE8","#444441"],"Western":["#FAEEDA","#633806"],"Musical":["#FBEAF0","#993556"]
};
const SEED = [
  {t:"Le Parrain",d:"F. F. Coppola",y:1972,g:"Crime"},
  {t:"Les Évadés",d:"Frank Darabont",y:1994,g:"Drame"},
  {t:"Pulp Fiction",d:"Quentin Tarantino",y:1994,g:"Crime"},
  {t:"La Liste de Schindler",d:"Steven Spielberg",y:1993,g:"Drame"},
  {t:"Le Seigneur des Anneaux: Le Retour du Roi",d:"Peter Jackson",y:2003,g:"Aventure"},
  {t:"Forrest Gump",d:"Robert Zemeckis",y:1994,g:"Drame"},
  {t:"Inception",d:"Christopher Nolan",y:2010,g:"Sci-Fi"},
  {t:"Fight Club",d:"David Fincher",y:1999,g:"Drame"},
  {t:"Matrix",d:"Wachowski",y:1999,g:"Sci-Fi"},
  {t:"Les Affranchis",d:"Martin Scorsese",y:1990,g:"Crime"},
  {t:"Le Voyage de Chihiro",d:"Hayao Miyazaki",y:2001,g:"Animation"},
  {t:"Il était une fois dans l'Ouest",d:"Sergio Leone",y:1968,g:"Western"},
  {t:"Casablanca",d:"Michael Curtiz",y:1942,g:"Romance"},
  {t:"2001 l'Odyssée de l'espace",d:"Stanley Kubrick",y:1968,g:"Sci-Fi"},
  {t:"Citizen Kane",d:"Orson Welles",y:1941,g:"Drame"},
  {t:"Le Fabuleux Destin d'Amélie Poulain",d:"Jean-Pierre Jeunet",y:2001,g:"Romance"},
  {t:"Les Temps modernes",d:"Charlie Chaplin",y:1936,g:"Comédie"},
  {t:"Retour vers le futur",d:"Robert Zemeckis",y:1985,g:"Sci-Fi"},
  {t:"Taxi Driver",d:"Martin Scorsese",y:1976,g:"Drame"},
  {t:"Apocalypse Now",d:"F. F. Coppola",y:1979,g:"Guerre"},
  {t:"Blade Runner",d:"Ridley Scott",y:1982,g:"Sci-Fi"},
  {t:"La vita è bella",d:"Roberto Benigni",y:1997,g:"Drame"},
  {t:"Les Dents de la mer",d:"Steven Spielberg",y:1975,g:"Aventure"},
  {t:"Singin' in the Rain",d:"Gene Kelly",y:1952,g:"Musical"},
  {t:"Parasite",d:"Bong Joon-ho",y:2019,g:"Thriller"},
  {t:"La La Land",d:"Damien Chazelle",y:2016,g:"Musical"},
  {t:"Whiplash",d:"Damien Chazelle",y:2014,g:"Drame"},
  {t:"Les Tontons flingueurs",d:"Georges Lautner",y:1963,g:"Comédie"},
  {t:"La Grande Évasion",d:"John Sturges",y:1963,g:"Aventure"},
  {t:"Dr. Folamour",d:"Stanley Kubrick",y:1964,g:"Comédie"},
  {t:"Le Dictateur",d:"Charlie Chaplin",y:1940,g:"Comédie"},
  {t:"Le Cercle des poètes disparus",d:"Peter Weir",y:1989,g:"Drame"},
  {t:"Rain Man",d:"Barry Levinson",y:1988,g:"Drame"},
  {t:"Gladiator",d:"Ridley Scott",y:2000,g:"Action"},
  {t:"Le Silence des agneaux",d:"Jonathan Demme",y:1991,g:"Thriller"},
  {t:"Les Sept Samouraïs",d:"Akira Kurosawa",y:1954,g:"Aventure"}
];
const STORAGE_KEY = "films-cultes-v1";
let films = [], currentTab = "todo";
function load(){try{const r=localStorage.getItem(STORAGE_KEY);if(r){films=JSON.parse(r);return;}}catch(e){}films=SEED.map((f,i)=>({id:"s"+i,title:f.t,director:f.d,year:f.y,genre:f.g,seen:false,rating:0}));save();}
function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(films));}catch(e){}}
const $=(id)=>document.getElementById(id);
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function render(){
  const todo=films.filter(f=>!f.seen),seen=films.filter(f=>f.seen);
  $("stat-todo").textContent=todo.length;$("stat-seen").textContent=seen.length;
  $("stat-pct").textContent=films.length?Math.round(seen.length/films.length*100)+"%":"0%";
  const rated=seen.filter(f=>f.rating>0);
  $("stat-avg").textContent=rated.length?(rated.reduce((s,f)=>s+f.rating,0)/rated.length).toFixed(1)+"/5":"–";
  const genres=[...new Set(films.map(f=>f.genre))].sort();
  const gf=$("filter-genre"),cur=gf.value;
  gf.innerHTML='<option value="">Tous genres</option>'+genres.map(g=>`<option value="${g}">${g}</option>`).join("");
  gf.value=cur;
  const search=$("search").value.toLowerCase(),genreFilter=gf.value;
  let list=currentTab==="todo"?todo:seen;
  if(search)list=list.filter(f=>f.title.toLowerCase().includes(search)||f.director.toLowerCase().includes(search));
  if(genreFilter)list=list.filter(f=>f.genre===genreFilter);
  const container=$("list");
  if(!list.length){container.innerHTML=`<div class="empty">${currentTab==="todo"?"Aucun film à voir. Ajoute-en un !":"Aucun film vu pour l'instant."}</div>`;return;}
  container.innerHTML=list.map(f=>{
    const[bg,fg]=GENRE_COLORS[f.genre]||["#F1EFE8","#444441"];
    const pill=`<span class="genre-pill" style="background:${bg};color:${fg};">${f.genre}</span>`;
    const rating=f.seen?`<div class="rating" data-id="${f.id}">${[1,2,3,4,5].map(n=>`<span class="star ${n<=f.rating?'on':''}" data-n="${n}">★</span>`).join("")}</div>`:"";
    const toggleLabel=f.seen?"↶ À revoir":"✓ Vu";
    return `<div class="film-row"><div><div class="film-title">${escapeHtml(f.title)} ${pill}</div><div class="film-meta">${escapeHtml(f.director)} · ${f.year}</div></div><div class="film-actions">${rating}<button data-act="toggle" data-id="${f.id}">${toggleLabel}</button><button data-act="del" data-id="${f.id}" class="btn-danger">✕</button></div></div>`;
  }).join("");
  container.querySelectorAll("button[data-act]").forEach(b=>{
    b.addEventListener("click",()=>{
      const id=b.dataset.id;
      if(b.dataset.act==="toggle"){const f=films.find(x=>x.id===id);f.seen=!f.seen;if(!f.seen)f.rating=0;}
      else if(b.dataset.act==="del"){films=films.filter(x=>x.id!==id);}
      save();render();
    });
  });
  container.querySelectorAll(".rating").forEach(r=>{
    r.querySelectorAll(".star").forEach(s=>{
      s.addEventListener("click",()=>{
        const f=films.find(x=>x.id===r.dataset.id);
        const n=parseInt(s.dataset.n);
        f.rating=f.rating===n?0:n;
        save();render();
      });
    });
  });
}
document.querySelectorAll(".tab-btn").forEach(b=>{
  b.addEventListener("click",()=>{
    document.querySelectorAll(".tab-btn").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");currentTab=b.dataset.tab;render();
  });
});
$("btn-add").addEventListener("click",()=>{
  const title=$("in-title").value.trim(),director=$("in-director").value.trim();
  const year=parseInt($("in-year").value),genre=$("in-genre").value;
  if(!title){$("in-title").focus();return;}
  films.unshift({id:"u"+Date.now(),title,director:director||"–",year:year||"–",genre,seen:false,rating:0});
  $("in-title").value="";$("in-director").value="";$("in-year").value="";
  save();render();
});
["in-title","in-director","in-year"].forEach(id=>$(id).addEventListener("keydown",e=>{if(e.key==="Enter")$("btn-add").click();}));
$("search").addEventListener("input",render);
$("filter-genre").addEventListener("change",render);
$("btn-export").addEventListener("click",()=>{
  const blob=new Blob([JSON.stringify(films,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob),a=document.createElement("a");
  a.href=url;a.download="films-cultes-"+new Date().toISOString().slice(0,10)+".json";a.click();
  URL.revokeObjectURL(url);
});
$("btn-import").addEventListener("click",()=>$("file-import").click());
$("file-import").addEventListener("change",e=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{try{const d=JSON.parse(reader.result);if(Array.isArray(d)){films=d;save();render();}}catch(err){alert("Fichier invalide");}};
  reader.readAsText(file);
});
$("btn-reset").addEventListener("click",()=>{
  if(confirm("Réinitialiser et revenir à la liste par défaut ? Tes ajouts et notes seront perdus.")){
    localStorage.removeItem(STORAGE_KEY);load();render();
  }
});
load();render();
</script>
</body>
</html>
